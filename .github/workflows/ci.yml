name: CI — Manueli's Clubes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes automatizados (pytest)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/app/requirements.txt

      - name: Instalar dependências
        working-directory: api
        run: pip install -r app/requirements.txt

      - name: Correr testes
        working-directory: api
        env:
          SECRET_KEY: "test-secret-key-ci-pipeline"
          ALGORITHM: "HS256"
          MYSQL_HOST: "localhost"
          MYSQL_PORT: "5432"
          MYSQL_USER: "test"
          MYSQL_PASSWORD: "test"
          MYSQL_DATABASE: "test_db"
          REDIS_URL: "redis://localhost:6379/0"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          SMTP_HOST: "localhost"
          SMTP_PORT: "587"
          SMTP_USER: "test@test.com"
          SMTP_PASSWORD: "test"
          SMTP_FROM: "test@test.com"
          FRONTEND_URL: "http://localhost:3000"
        run: pytest tests/ -v --tb=short

      - name: Sumário dos resultados
        if: always()
        run: |
          echo "## Resultados dos Testes" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline concluído — ver logs acima para detalhes." >> $GITHUB_STEP_SUMMARY

  lint:
    name: Qualidade de código (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ruff
        run: pip install ruff

      - name: Verificar qualidade de código
        working-directory: api/app
        run: ruff check . --ignore E501
        continue-on-error: true

  docker:
    name: Build Docker (verificação)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem API (sem push)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: manueli-clubes-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max